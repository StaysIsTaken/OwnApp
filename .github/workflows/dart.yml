name: iOS-ipa-build
on:
  workflow_dispatch:
jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    permissions:
      contents: write          # <- nötig für Release-Upload + Pages-Push
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter pub get

      - run: pod repo update
        working-directory: ios
      - run: flutter build ios --release --no-codesign
      - run: mkdir Payload
        working-directory: build/ios/iphoneos
      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos
      - name: Zip output
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"

      # ---------- NEU ab hier ----------
      - name: apps.json erzeugen
        run: |
          IPA=build/ios/iphoneos/FlutterIpaExport.ipa
          SIZE=$(stat -f%z "$IPA")
          mkdir -p public
          cat > public/apps.json <<EOF
          {
            "name": "JP's Apps",
            "identifier": "de.jpanft.source",
            "apps": [{
              "name": "MeineApp",
              "bundleIdentifier": "DEINE.BUNDLE.ID",
              "developerName": "JP",
              "localizedDescription": "Automatischer Build aus CI",
              "versions": [{
                "version": "1.0.${{ github.run_number }}",
                "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                "downloadURL": "https://github.com/${{ github.repository }}/releases/download/v1.0/FlutterIpaExport.ipa",
                "size": $SIZE,
                "minOSVersion": "15.0"
              }]
            }]
          }
          EOF

      - name: Auf GitHub Pages veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
