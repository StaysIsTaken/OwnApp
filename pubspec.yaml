name: productivity
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  http: ^1.6.0
  intl: ^0.19.0
  kanban_board: ^1.0.0+2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  web_socket_channel: ^3.0.3
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  flutter_markdown: ^0.6.14
  table_calendar: ^3.1.3
  file_picker: ^8.1.2
  record: ^5.2.1
  path_provider: ^2.1.4
  cross_file: ^0.3.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# record 5.x zieht sonst das veraltete record_linux 0.7.2, das die neuere
# record_platform_interface (1.6.0, von record_android/windows genutzt) nicht
# implementiert -> Build-Fehler. Wir heben record_linux auf eine passende
# Version, die zum Interface 1.6.0 passt (alle anderen Plattformen bleiben gleich).
dependency_overrides:
  record_linux: ^1.3.1

flutter:
  uses-material-design: true
